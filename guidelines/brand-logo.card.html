<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:0}
.row{display:flex;height:220px}
.cell{flex:1;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center}
.dark{background:#000}
.wm{font-weight:600;font-size:24px;color:var(--bca-blue)}
.cap{font-size:11px;color:var(--bca-muted)}
.dark .cap{color:rgba(255,255,255,.5)}</style></head>
<body><div class="row">
<div class="cell"><img src="../assets/logo-bca.png" alt="BCA Partners" style="height:56px"><span class="cap">Primary logo (light)</span></div>
<div class="cell dark"><span class="wm">BCA Partners</span><span class="cap">Footer wordmark (type, blue)</span></div>
</div></body></html>
