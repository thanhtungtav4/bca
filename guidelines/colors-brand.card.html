<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px}
.row{display:flex;gap:16px}
.sw{flex:1;border-radius:6px;overflow:hidden;border:1px solid var(--bca-border)}
.chip{height:74px}
.meta{padding:8px 12px}
.name{font-size:13px;font-weight:700;color:var(--bca-ink)}
.hex{font-size:12px;color:var(--bca-ink-2);font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:#003f6f"></div><div class="meta"><div class="name">Navy / Primary</div><div class="hex">#003F6F · rgb(0,63,111)</div></div></div>
<div class="sw"><div class="chip" style="background:#0079a6"></div><div class="meta"><div class="name">Blue / Accent</div><div class="hex">#0079A6 · rgb(0,121,166)</div></div></div>
<div class="sw"><div class="chip" style="background:#000"></div><div class="meta"><div class="name">Black / Footer</div><div class="hex">#000000</div></div></div>
</div></body></html>
