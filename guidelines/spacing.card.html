<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing & radius" subtitle="8px rhythm, single 4px radius" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:28px;color:var(--bca-ink)}
.scale{display:flex;align-items:flex-end;gap:14px;margin-bottom:24px}
.bar{background:var(--bca-navy);border-radius:2px}
.b figcaption{font-size:10px;color:var(--bca-muted);text-align:center;margin-top:5px}
.b{display:flex;flex-direction:column;align-items:center}
.rad{display:flex;gap:20px;align-items:center}
.box{width:80px;height:52px;background:var(--bca-section,#e9ecf2);border:1px solid var(--bca-navy);border-radius:4px;background:var(--bca-surface-section)}
.note{font-size:12px;color:var(--bca-ink-2)}</style></head>
<body>
<div class="scale">
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:4px"></div><figcaption>4</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:8px"></div><figcaption>8</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:12px"></div><figcaption>12</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:16px"></div><figcaption>16</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:24px"></div><figcaption>24</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:32px"></div><figcaption>32</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:48px"></div><figcaption>48</figcaption></figure>
<figure class="b" style="margin:0"><div class="bar" style="width:22px;height:80px"></div><figcaption>80</figcaption></figure>
</div>
<div class="rad"><div class="box"></div><span class="note">Single brand radius — <b>4px</b> on cards, buttons, images. Circular chips use a full pill.</span></div>
</body></html>
