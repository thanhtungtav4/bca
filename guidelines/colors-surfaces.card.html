<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & borders" subtitle="Neutral fills used behind content" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px}
.row{display:flex;gap:16px}
.sw{flex:1;border-radius:6px;overflow:hidden;border:1px solid var(--bca-border)}
.chip{height:74px}.meta{padding:8px 12px}
.name{font-size:13px;font-weight:700;color:var(--bca-ink)}
.hex{font-size:12px;color:var(--bca-ink-2)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:#f5f5f5"></div><div class="meta"><div class="name">Surface muted</div><div class="hex">#F5F5F5</div></div></div>
<div class="sw"><div class="chip" style="background:#e9ecf2"></div><div class="meta"><div class="name">Section</div><div class="hex">#E9ECF2</div></div></div>
<div class="sw"><div class="chip" style="background:#e0e1e5"></div><div class="meta"><div class="name">Border / Card</div><div class="hex">#E0E1E5</div></div></div>
<div class="sw"><div class="chip" style="background:#dee1e6"></div><div class="meta"><div class="name">Caption bar</div><div class="hex">#DEE1E6</div></div></div>
</div></body></html>
