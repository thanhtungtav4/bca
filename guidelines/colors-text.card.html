<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px}
.row{display:flex;gap:16px}
.sw{flex:1;border-radius:6px;overflow:hidden;border:1px solid var(--bca-border)}
.chip{height:74px}.meta{padding:8px 12px}
.name{font-size:13px;font-weight:700;color:var(--bca-ink)}
.hex{font-size:12px;color:var(--bca-ink-2)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:#111827"></div><div class="meta"><div class="name">Ink / Heading</div><div class="hex">#111827</div></div></div>
<div class="sw"><div class="chip" style="background:#374151"></div><div class="meta"><div class="name">Ink-2 / Body</div><div class="hex">#374151</div></div></div>
<div class="sw"><div class="chip" style="background:#8896a6"></div><div class="meta"><div class="name">Muted / Divider</div><div class="hex">#8896A6</div></div></div>
</div></body></html>
