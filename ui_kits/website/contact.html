<!-- @startingPoint section="Website" subtitle="Contact page" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BCA Partners — Contact</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, Button, Input, Icon } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

function Hero(){
  return (
    <section style={{position:"relative",overflow:"hidden",padding:"56px 112px",backgroundImage:`linear-gradient(rgba(0,121,166,0.85),rgba(0,121,166,0.85)), url(${A}contact-bg.jpg)`,backgroundSize:"cover",backgroundPosition:"center"}}>
      <h1 style={{margin:0,fontWeight:700,fontSize:48,lineHeight:"56px",letterSpacing:"-0.025em",color:"#fff"}}>Contact Us</h1>
      <p style={{margin:"12px 0 0",fontWeight:400,fontSize:18,lineHeight:"28px",color:"rgba(255,255,255,0.92)"}}>Fill out the form to contact our team — we'll get back within one business day.</p>
    </section>
  );
}

function Detail({ icon, label, value }){
  return (
    <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
      <span style={{color:"var(--bca-navy)",flexShrink:0,marginTop:2}}><Icon name={icon} size={22} /></span>
      <div>
        <div style={{fontWeight:700,fontSize:14,color:"var(--bca-ink)"}}>{label}</div>
        <div style={{fontSize:16,lineHeight:"24px",color:"var(--bca-ink-2)",whiteSpace:"pre-line"}}>{value}</div>
      </div>
    </div>
  );
}

function Body(){
  const [sent,setSent]=React.useState(false);
  return (
    <section style={{padding:"80px 112px",display:"grid",gridTemplateColumns:"minmax(0,1.3fr) minmax(0,1fr)",gap:80,alignItems:"start"}}>
      <div>
        <h2 style={{margin:"0 0 24px",fontWeight:700,fontSize:32,color:"var(--bca-navy)"}}>Get in touch</h2>
        {sent ? (
          <div style={{padding:32,borderRadius:4,background:"var(--bca-surface-section)",fontWeight:600,color:"var(--bca-navy)"}}>Thank you — your message has been sent. We'll be in touch shortly.</div>
        ) : (
          <form onSubmit={(e)=>{e.preventDefault();setSent(true);}} style={{display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <Input label="Full name" placeholder="Your name" required />
              <Input label="Company" placeholder="Company name" />
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <Input label="Email" type="email" placeholder="you@company.com" required />
              <Input label="Phone" placeholder="+84 …" />
            </div>
            <Input label="Message" multiline rows={5} placeholder="How can we help you succeed?" />
            <div><Button variant="filled" icon as="button">Send message</Button></div>
          </form>
        )}
      </div>
      <aside style={{display:"flex",flexDirection:"column",gap:28,padding:32,borderRadius:4,background:"var(--bca-surface-section)"}}>
        <h3 style={{margin:0,fontWeight:700,fontSize:20,color:"var(--bca-navy)"}}>BCA Partners</h3>
        <Detail icon="EssentialIconIconMapPin" label="Office" value={"Unit G2, FOSCO Building\n06 Phung Khac Khoan\nDakao Ward, District 1, HCMC, Vietnam"} />
        <Detail icon="EssentialIconIconPhone" label="Telephone" value="+84 2835124414" />
        <Detail icon="EssentialIconIconMail" label="Email" value="info@bcapartners.com.vn" />
      </aside>
    </section>
  );
}

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="Contact us" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <Hero />
      <Body />
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html"};
document.addEventListener('click',(e)=>{const a=e.target.closest('a');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
