<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BCA Partners — Binh Pham</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
  .pad{padding-left:112px;padding-right:112px}
  .hero{position:relative;background:var(--bca-surface-section);min-height:420px;display:grid;grid-template-columns:minmax(0,1fr) 400px;gap:40;align-items:center}
  .bio p{margin:0 0 20px;font-size:17px;line-height:28px;color:var(--bca-ink-2);white-space:pre-line}
  .team{display:flex;gap:32;overflow-x:auto;padding-bottom:8px}
  @media(max-width:900px){.pad{padding-left:20px;padding-right:20px}.hero{grid-template-columns:1fr;min-height:0}.hero-img{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, SectionHeading, LeaderCard } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

const BIO = `Before founding BCA Partners, Mr. Binh served as CEO at Vietnam International Securities (VIS). With over 14 years of combined experience in Banking, Finance, and Investment, he has extensive relationships in various sectors including Private Equity, Investment Banking, Commercial Banks, and Investment Advisory firms both in Vietnam and overseas.

Previously, Mr. Binh was Deputy Head of Restructuring Committee, Chief Investment Officer cum Deputy CEO at DongA Securities (DAS). He made great contributions to DAS during his tenor at the firm, especially in the areas of Research, Corporate Finance Advisory, and Investment. Before joining DAS, Mr. Binh worked at several MNCs, including Global Foundries & OCBC Bank in Singapore. He was Investment Manager at TIM Investment & Management, Research Manager at Vinasecurities, and Strategy Director at DongA Bank.

Mr. Binh graduated with a First Class Honors Degree from Nanyang Technological University, Singapore. He obtained an MBA Degree (with Honors Distinction) from the University of Chicago Booth School of Business — USA. He has been a certified CFA Charterholder since 2011.`;

const TEAM = [
  { photo:A+"leader-binh.jpg", name:"Binh Pham, MBA, CFA", role:"Managing Director" },
  { photo:A+"leader-thuy.png", name:"Thuy Huynh, PhD", role:"Director, Operations & Transformation" },
  { photo:A+"leader-chau2.jpg", name:"Chau Tran, Msc", role:"Director, Finance & Human Capital" },
  { photo:A+"leader-binh.jpg", name:"Anthony Lawrence, MBA", role:"Advisor, Venture Capital Specialist" },
  { photo:A+"leader-andy.png", name:"Andy Phan, PhD, MBA", role:"Advisor, Financial Market & Strategy" },
];

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="Our team" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <section className="hero pad" style={{gap:40}}>
        <div style={{display:"flex",flexDirection:"column",gap:12,padding:"64px 0"}}>
          <a href="leadership.html" style={{fontWeight:600,fontSize:14,textDecoration:"none"}}>&larr; Our Leadership</a>
          <h1 style={{margin:"12px 0 0",fontWeight:700,fontSize:52,lineHeight:"60px",letterSpacing:"-0.025em",color:"var(--bca-ink)"}}>Binh Pham, MBA, CFA</h1>
          <span style={{fontSize:20,color:"var(--bca-ink-2)"}}>Managing Director</span>
        </div>
        <img className="hero-img" src={A+"leader-binh.jpg"} alt="Binh Pham" style={{width:400,height:420,objectFit:"cover",objectPosition:"top center",alignSelf:"end"}} />
      </section>
      <section className="pad bio" style={{padding:"64px 112px",maxWidth:1060,boxSizing:"border-box"}}>
        <p>{BIO}</p>
      </section>
      <section className="pad" style={{padding:"0 112px 80px"}}>
        <div style={{marginBottom:32}}><SectionHeading align="left">Management Team</SectionHeading></div>
        <div className="team">
          {TEAM.map((p,i)=>(
            <a key={i} href="leader-detail.html" style={{textDecoration:"none",color:"inherit",width:260,flexShrink:0}}>
              <LeaderCard {...p} style={{width:"100%"}} />
            </a>
          ))}
        </div>
      </section>
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html"};
document.addEventListener('click',(e)=>{const a=e.target.closest('a,button');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
