<!-- @startingPoint section="Website" subtitle="Research / insights page" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BCA Partners — Research</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, Button, ContactBand, FeatureItem } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

const ARTICLES = [
  { image: A+"research-1.jpg", eyebrow: "FINTECH", title: "The future of payment in Vietnam's Fintech market", excerpt: "High internet penetration and a young, mobile-first population are fostering the next wave of digital payments — and reshaping who wins in financial services.", flip:false },
  { image: A+"feature-msme.jpg", eyebrow: "MSME FINANCE", title: "Closing the credit gap for Vietnamese MSMEs", excerpt: "Micro, small and medium enterprises remain underserved by traditional bank lending. We map the barriers and the emerging alternative-finance models.", flip:true },
  { image: A+"project-dragonfruit.jpg", eyebrow: "AGRICULTURE", title: "Restructuring the dragon fruit value chain", excerpt: "A national staple export facing low peak-season prices and high logistics costs — and a roadmap for a more resilient, higher-value chain.", flip:false },
];

function Hero(){
  return (
    <section style={{padding:"54px 112px 40px",background:"#fff",textAlign:"center"}}>
      <div style={{maxWidth:764,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}}>
        <h1 style={{margin:0,fontWeight:700,fontSize:60,lineHeight:"72px",letterSpacing:"-0.025em",color:"var(--bca-ink)"}}>Research</h1>
        <p style={{margin:0,fontWeight:400,fontSize:18,lineHeight:"28px",color:"#000"}}>Explore up-to-date content on the trending topics, industry data, and concepts that are shaping business and society today.</p>
      </div>
    </section>
  );
}

function Article({ image, eyebrow, title, excerpt, flip }){
  const media = <div style={{flex:"0 0 624px",maxWidth:624}}><FeatureItem image={image} height={465} /></div>;
  const text = (
    <div style={{flex:1,display:"flex",flexDirection:"column",gap:16,justifyContent:"center"}}>
      <span style={{fontWeight:600,fontSize:16,lineHeight:"24px",color:"var(--bca-navy)"}}>{eyebrow}</span>
      <h2 style={{margin:0,fontWeight:700,fontSize:32,lineHeight:"40px",color:"var(--bca-ink)"}}>{title}</h2>
      <p style={{margin:0,fontWeight:400,fontSize:16,lineHeight:"24px",color:"var(--bca-ink-2)"}}>{excerpt}</p>
      <Button variant="ghost" icon size="sm">Read more</Button>
    </div>
  );
  return (
    <article style={{display:"flex",gap:64,alignItems:"stretch"}}>
      {flip ? <React.Fragment>{text}{media}</React.Fragment> : <React.Fragment>{media}{text}</React.Fragment>}
    </article>
  );
}

function Articles(){
  return (
    <section style={{padding:"40px 112px 80px",background:"#fff",display:"flex",flexDirection:"column",gap:64}}>
      {ARTICLES.map((a)=><Article key={a.title} {...a} />)}
      <div style={{display:"flex",justifyContent:"center"}}><Button variant="filled" icon>View all research</Button></div>
    </section>
  );
}

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="Research" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <Hero />
      <Articles />
      <ContactBand image={A+"contact-bg.jpg"} />
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html","Read more":"research-detail.html"};document.addEventListener('click',(e)=>{const a=e.target.closest('a,button');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
