<!-- @startingPoint section="Website" subtitle="Service detail page" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BCA Partners — Mergers & Acquisitions</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
  .split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:64;padding:72px 112px;align-items:center}
  .cap{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:32}
  .related{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:32}
  @media(max-width:900px){.split{grid-template-columns:1fr;gap:32;padding:48px 20px}.cap{grid-template-columns:1fr}.related{grid-template-columns:1fr}.pad{padding-left:20px !important;padding-right:20px !important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, Button, ContactBand, FeatureItem, ServiceCard } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

const CAPS = [
  { t:"Sell-side advisory", d:"Positioning, valuation and running a competitive process to maximise value for sellers." },
  { t:"Buy-side advisory", d:"Target identification, diligence and negotiation support for acquirers." },
  { t:"Post-M&A business strategy", d:"Integration planning and value-creation roadmaps after close." },
  { t:"Leveraged buyouts", d:"Structuring and financing support for management and sponsor-led buyouts." },
];

function Hero(){
  return (
    <section className="pad" style={{padding:"48px 112px 0"}}>
      <a href="services.html" style={{fontWeight:600,fontSize:14,textDecoration:"none"}}>&larr; All services</a>
    </section>
  );
}

function Intro(){
  return (
    <section className="split" style={{paddingTop:32}}>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <span style={{fontWeight:600,fontSize:16,color:"var(--bca-navy)"}}>SERVICE</span>
        <h1 style={{margin:0,fontWeight:700,fontSize:48,lineHeight:"56px",letterSpacing:"-0.025em",color:"var(--bca-ink)"}}>Mergers &amp; Acquisitions</h1>
        <p style={{margin:0,fontSize:18,lineHeight:"28px",color:"var(--bca-ink-2)"}}>We advise buyers and sellers across the full deal lifecycle — from strategy and valuation to negotiation, execution and post-deal integration — with deep local insight into the Vietnamese market.</p>
        <div style={{marginTop:8}}><Button variant="filled" icon>Talk to our team</Button></div>
      </div>
      <FeatureItem image={A+"service-strategy.jpg"} height={380} />
    </section>
  );
}

function Capabilities(){
  return (
    <section className="pad" style={{padding:"24px 112px 72px"}}>
      <h2 style={{margin:"0 0 40px",fontWeight:700,fontSize:32,color:"var(--bca-navy)"}}>What we do</h2>
      <div className="cap">
        {CAPS.map((c)=>(
          <div key={c.t} style={{display:"flex",flexDirection:"column",gap:8,paddingTop:20,borderTop:"2px solid var(--bca-navy)"}}>
            <h3 style={{margin:0,fontWeight:700,fontSize:20,color:"var(--bca-ink)"}}>{c.t}</h3>
            <p style={{margin:0,fontSize:16,lineHeight:"24px",color:"var(--bca-ink-2)"}}>{c.d}</p>
          </div>
        ))}
      </div>
    </section>
  );
}

function Related(){
  return (
    <section className="pad" style={{padding:"0 112px 80px"}}>
      <h2 style={{margin:"0 0 32px",fontWeight:700,fontSize:28,color:"var(--bca-navy)"}}>Related services</h2>
      <div className="related">
        <ServiceCard image={A+"service-market-entry.jpg"} title="Strategy" href="service-detail.html" />
        <ServiceCard image={A+"service-capital.jpg"} title="Capital Raising" href="service-detail.html" />
        <ServiceCard image={A+"service-restructuring.jpg"} title="Corporate Restructuring" href="service-detail.html" />
      </div>
    </section>
  );
}

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="Our services" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <Hero />
      <Intro />
      <Capabilities />
      <Related />
      <ContactBand image={A+"contact-bg.jpg"} />
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html","Talk to our team":"contact.html"};
document.addEventListener('click',(e)=>{const a=e.target.closest('a,button');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
