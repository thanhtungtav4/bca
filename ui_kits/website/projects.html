<!-- @startingPoint section="Website" subtitle="Highlighted projects page" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BCA Partners — Highlighted Projects</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, Button, ContactBand, FeatureItem } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

const PROJECTS = [
  { image:A+"project-strategy.jpg", eyebrow:"FINTECH PROJECTS", client:"MM TECHNOLOGY", title:"Strategy consulting & Implementation support", body:"As an independent consultant, BCA Partners assisted the e-wallet client across key areas of the business — from strategy to implementation support and post-launch optimisation." },
  { image:A+"project-dragonfruit.jpg", eyebrow:"MARKET RESEARCH SERVICES", client:"AGRITECH VIETNAM", title:"Dragon fruit value chain Restructuring", body:"A national staple export facing low peak-season prices, high logistics and storage costs. We designed a more resilient, higher-value chain and financing model." },
  { image:A+"service-market-entry.jpg", eyebrow:"MARKET ENTRY", client:"GLOBAL PAYMENTS", title:"Vietnam market entry advisory", body:"Regulatory landscape, partner identification and go-to-market strategy for an international payments leader entering the Vietnamese market." },
  { image:A+"service-restructuring.jpg", eyebrow:"CORPORATE RESTRUCTURING", client:"REGIONAL MANUFACTURER", title:"Operational & financial restructuring", body:"Turnaround planning, cost optimisation and balance-sheet restructuring to restore profitability and prepare the business for growth capital." },
];

function Hero(){
  return (
    <section style={{padding:"54px 112px 24px",textAlign:"center"}}>
      <h1 style={{margin:"0 auto",maxWidth:764,fontWeight:700,fontSize:60,lineHeight:"72px",letterSpacing:"-0.025em",color:"var(--bca-ink)"}}>Highlighted Projects</h1>
      <p style={{margin:"16px auto 0",maxWidth:764,fontWeight:400,fontSize:18,lineHeight:"28px",color:"#000"}}>A selection of engagements where BCA Partners turned complex business challenges into practical, measurable outcomes.</p>
    </section>
  );
}

function Row({ image, eyebrow, client, title, body, flip }){
  const media = <div style={{flex:"0 0 560px",maxWidth:560}}><FeatureItem image={image} height={360} /></div>;
  const text = (
    <div style={{flex:1,display:"flex",flexDirection:"column",gap:12,justifyContent:"center"}}>
      <span style={{fontWeight:600,fontSize:16,lineHeight:"24px",color:"var(--bca-navy)"}}>{eyebrow}</span>
      <h2 style={{margin:0,fontWeight:700,fontSize:32,lineHeight:"40px",color:"var(--bca-ink)"}}>{title}</h2>
      <span style={{fontWeight:600,fontSize:16,color:"var(--bca-black)"}}>{client}</span>
      <p style={{margin:0,fontWeight:400,fontSize:16,lineHeight:"24px",color:"var(--bca-ink-2)"}}>{body}</p>
      <Button variant="ghost" icon size="sm">Read case study</Button>
    </div>
  );
  return (
    <article style={{display:"flex",gap:64,alignItems:"stretch"}}>
      {flip ? <React.Fragment>{text}{media}</React.Fragment> : <React.Fragment>{media}{text}</React.Fragment>}
    </article>
  );
}

function Projects(){
  return (
    <section style={{padding:"40px 112px 80px",display:"flex",flexDirection:"column",gap:64}}>
      {PROJECTS.map((p,i)=><Row key={p.title} {...p} flip={i%2===1} />)}
    </section>
  );
}

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="Projects" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <Hero />
      <Projects />
      <ContactBand image={A+"contact-bg.jpg"} />
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html","Read case study":"project-detail.html"};
document.addEventListener('click',(e)=>{const a=e.target.closest('a,button');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
