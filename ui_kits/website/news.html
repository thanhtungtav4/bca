<!-- @dsCard group="Website" viewport="1440x900" name="BCA Partners — News" subtitle="Company news & press list" -->
<!-- @startingPoint section="Website" subtitle="News listing page" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BCA Partners — News</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  .navwrap{position:sticky;top:0;z-index:50}
  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:32}
  @media(max-width:900px){.grid{grid-template-columns:1fr}.pad{padding-left:20px !important;padding-right:20px !important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Navbar, Footer, Button, FeatureItem } = window.BCAPartnersDesignSystem_f92865;
const A = "../../assets/";

const NEWS = [
  { image:A+"project-strategy.jpg", cat:"DEAL", date:"18 Apr 2024", title:"BCA Partners advises on landmark e-wallet transaction", excerpt:"Acting as independent advisor, BCA supported a leading fintech client through a major strategic transaction." },
  { image:A+"leadership-hero.jpg", cat:"COMPANY", date:"02 Apr 2024", title:"BCA Partners expands its advisory team", excerpt:"Three senior advisors join to strengthen our capabilities across financial markets and risk." },
  { image:A+"service-market-entry.jpg", cat:"EVENT", date:"21 Mar 2024", title:"BCA Partners at the Vietnam M&A Forum 2024", excerpt:"Our Managing Director shared perspectives on cross-border deal-making in Southeast Asia." },
  { image:A+"research-1.jpg", cat:"PRESS RELEASE", date:"12 Mar 2024", title:"New market-entry practice launched", excerpt:"A dedicated practice to help international clients enter and scale in the Vietnamese market." },
  { image:A+"project-dragonfruit.jpg", cat:"DEAL", date:"28 Feb 2024", title:"Agriculture value-chain restructuring completed", excerpt:"BCA delivered a restructuring roadmap for a national staple-export supply chain." },
  { image:A+"service-restructuring.jpg", cat:"COMPANY", date:"15 Feb 2024", title:"BCA Partners marks another year of growth", excerpt:"Reflecting on a year of new mandates, new talent and deeper client relationships." },
];

function Hero(){
  return (
    <section className="pad" style={{padding:"54px 112px 24px",textAlign:"center"}}>
      <h1 style={{margin:"0 auto",maxWidth:764,fontWeight:700,fontSize:60,lineHeight:"72px",letterSpacing:"-0.025em",color:"var(--bca-ink)"}}>News</h1>
      <p style={{margin:"16px auto 0",maxWidth:764,fontWeight:400,fontSize:18,lineHeight:"28px",color:"#000"}}>The latest deals, announcements and events from BCA Partners.</p>
    </section>
  );
}

function Card({ image, cat, date, title, excerpt }){
  return (
    <a href="news-detail.html" style={{textDecoration:"none",color:"inherit",display:"flex",flexDirection:"column",gap:16}}>
      <FeatureItem image={image} height={220} />
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontWeight:600,fontSize:13,color:"var(--bca-navy)",letterSpacing:"0.03em"}}>{cat}</span>
        <span style={{fontSize:13,color:"var(--bca-muted)"}}>{date}</span>
      </div>
      <h3 style={{margin:0,fontWeight:700,fontSize:20,lineHeight:"28px",color:"var(--bca-ink)"}}>{title}</h3>
      <p style={{margin:0,fontWeight:400,fontSize:15,lineHeight:"23px",color:"var(--bca-ink-2)"}}>{excerpt}</p>
    </a>
  );
}

function App(){
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc={A+"logo-bca.png"} active="News" links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <Hero />
      <section className="pad" style={{padding:"24px 112px 80px"}}>
        <div className="grid">{NEWS.map((n)=><Card key={n.title} {...n} />)}</div>
        <div style={{display:"flex",justifyContent:"center",marginTop:56}}><Button variant="filled" icon>Load more</Button></div>
      </section>
      <Footer />
    </div>
  );
}
const PAGES={"Home":"index.html","About us":"about.html","Our services":"services.html","Projects":"projects.html","Research":"research.html","News":"news.html","Career":"career.html","Contact us":"contact.html","Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html"};
document.addEventListener('click',(e)=>{const a=e.target.closest('a,button');if(!a)return;const t=(a.textContent||'').trim();if(PAGES[t]){e.preventDefault();location.href=PAGES[t];}});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
