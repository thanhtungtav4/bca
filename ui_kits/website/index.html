<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BCA Partners</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:#fff;color:var(--bca-ink)}
  a{color:var(--link)}a:hover{color:var(--link-hover)}
  #stage>*{scroll-margin-top:80px}
  .navwrap{position:sticky;top:0;z-index:50}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Homepage.jsx"></script>
<script type="text/babel" src="Leadership.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel">
const { Navbar, Footer } = window.BCAPartnersDesignSystem_f92865;
const ROUTES = {
  "Home": () => <window.Homepage onNav={go} />,
  "Our team": () => <window.Leadership />,
  "Contact us": () => <window.Contact />,
};
let setRoute;
function go(name){ if(PAGES[name]){ location.href = PAGES[name]; return; } if(setRoute){ setRoute(ROUTES[name] ? name : "Home"); window.scrollTo(0,0);} }
function App(){
  const [route, _set] = React.useState("Home");
  setRoute = _set;
  const View = ROUTES[route] || ROUTES["Home"];
  const active = ROUTES[route] ? route : "Home";
  return (
    <div>
      <div className="navwrap"><Navbar logoSrc="../../assets/logo-bca.png" active={active} links={["Home","About us","Our services","Projects","Research","News","Career","Contact us"]} /></div>
      <div id="stage" onClick={(e)=>{const a=e.target.closest('[data-nav]');}}>{View()}</div>
      <Footer />
    </div>
  );
}
// intercept nav clicks: Home stays in-app, other links go to their page file
const PAGES = { "About us":"about.html", "Our services":"services.html", "Projects":"projects.html", "Research":"research.html","News":"news.html", "Career":"career.html", "Contact us":"contact.html", "Our team":"leadership.html","Privacy Policy":"privacy.html","Terms of Use":"privacy.html" };
document.addEventListener('click', (e)=>{
  const a = e.target.closest('a'); if(!a) return;
  const t = (a.textContent||'').trim();
  if(PAGES[t]){ e.preventDefault(); location.href = PAGES[t]; }
  else if(ROUTES[t]){ e.preventDefault(); go(t); }
});
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
