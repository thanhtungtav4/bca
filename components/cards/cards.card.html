<!-- @dsCard group="Components" viewport="700x520" name="Cards (Service, Project, Feature, Leader, Client)" subtitle="Content cards used across the site" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.lbl{font-size:12px;font-weight:600;color:var(--bca-muted);letter-spacing:.04em;text-transform:uppercase;margin:0 0 10px}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const A="../../assets/";
const { ServiceCard, ProjectCard, FeatureCard, LeaderCard, ClientLogo } = window.BCAPartnersDesignSystem_f92865;
function Demo(){
  return (<div className="grid">
    <div><p className="lbl">ServiceCard</p><ServiceCard image={A+"service-strategy.jpg"} title="Strategy" /></div>
    <div><p className="lbl">LeaderCard</p><LeaderCard photo={A+"leader-binh.jpg"} name="Binh Pham, MBA, CFA" role="Managing Director" style={{width:'100%'}} /></div>
    <div style={{gridColumn:'1 / -1'}}><p className="lbl">FeatureCard</p><FeatureCard image={A+"feature-fintech.jpg"} height={300} headline="Identifying the right partner is crucial for success" description="The future of Payment in Fintech is fostered by high internet usage in Vietnam" /></div>
    <div><p className="lbl">ProjectCard</p><ProjectCard image={A+"project-strategy.jpg"} eyebrow="FINTECH PROJECTS" title="Strategy consulting & Restructuring" client="MM TECHNOLOGY" description="BCA Partners assisted the e-wallet client in key areas of the business." /></div>
    <div><p className="lbl">ClientLogo</p><div style={{display:'flex',gap:16,flexWrap:'wrap'}}><ClientLogo logo={A+"client-1.png"} /><ClientLogo logo={A+"client-2.png"} /></div></div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
