<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css">
<style>html,body{margin:0}
.tile{width:1280px;height:854px;display:flex;font-family:var(--font-sans)}
.main{flex:1;background:#003f6f;display:flex;align-items:center;justify-content:center}
.name{color:#fff;font-weight:800;letter-spacing:-.02em;font-size:150px;line-height:.9;text-align:center}
.name small{display:block;font-weight:600;font-size:64px;letter-spacing:.24em;color:#8fb4cf;margin-top:18px}
.strip{width:300px;display:flex;flex-direction:column}
.strip div{flex:1}</style></head>
<body><div class="tile">
<div class="main"><div class="name">BCA<small>PARTNERS</small></div></div>
<div class="strip">
<div style="background:#7fb3cc"></div>
<div style="background:#0079a6"></div>
<div style="background:#000000"></div>
</div>
</div></body></html>
